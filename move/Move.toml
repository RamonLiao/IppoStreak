[package]
name = "predict_league"
edition = "2024.beta"
license = "MIT"

[dependencies]
# System deps (Sui, MoveStdlib) are auto-added in the new package management format.

# DeepBook Predict — DEPLOYED testnet architecture (monolithic OracleSVI), NOT source HEAD.
# VENDORED from deepbookv3 @ commit 19f86eba (last predict-touching commit before the 2026-04-16
# testnet deploy; module set matches deployed 0xf5ea2b). We vendor instead of using a git dep because
# the packages at that rev are old-style with no `[env.testnet]` published block in their Move.lock,
# so `sui client publish` reports them as "unpublished" (it only honors a dep's published-id from the
# dep's OWN lock for DIRECT deps — a dep-replacement published-at is ignored for direct deps in sui
# 1.73). The vendored copies carry a hand-added `[env.testnet]` block pointing at the deployed ids,
# which makes the publish link against the on-chain packages (the `token`/DEEP pattern). Do NOT bump
# the source rev — main is the unreleased MarketOracle/ExpiryMarket rewrite that is not on testnet.
deepbook_predict = { local = "vendor/predict" }

# DUSDC coin type used as the stake currency; its named address must be in scope for
# `dusdc::dusdc::DUSDC`, so declare it directly (it is a generic type param, not linked into predict).
dusdc = { local = "vendor/dusdc" }

# deepbook is transitive (vendor/predict -> local ../deepbook == vendor/deepbook); its published-id
# comes from vendor/deepbook/Move.lock [env.testnet]. token/DEEP resolves from its own git lock.
# predict_math has NO separate published-at (compiled into 0xf5ea2b).
